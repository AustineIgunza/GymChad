[build]
command = "cd frontend && npm run build"
publish = "frontend/dist"

[build.environment]
NODE_VERSION = "18.17.0"
NPM_VERSION = "9.6.7"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/*"
[headers.values]
"Cache-Control" = "public, max-age=0, must-revalidate"

[[headers]]
for = "/assets/*"
[headers.values]
"Cache-Control" = "public, max-age=31536000, immutable"
